<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — RECON Strength</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#FF140F;
  --bg:#080810;
  --white:#fff;
  --muted:#6b7280;
  --bebas:'Bebas Neue',sans-serif;
  --inter:'Inter',sans-serif;
  --radius-sm:10px;
}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--white);
  font-family:var(--inter);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:40px 5vw;
  position:relative;
}
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(255,20,15,0.10) 0%,transparent 70%);
}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:32px}

h1{
  font-family:var(--bebas);
  font-size:clamp(72px,14vw,120px);
  line-height:.9;
  letter-spacing:2px;
  color:var(--white);
  text-shadow:0 0 80px rgba(255,20,15,0.25);
}
.sub{
  font-family:var(--inter);
  font-size:clamp(15px,2vw,18px);
  font-weight:400;
  color:var(--muted);
  letter-spacing:.3px;
  margin-top:-12px;
}
.btn{
  background:var(--red);
  color:var(--white);
  font-family:var(--inter);
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:16px 40px;
  border:none;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  border-radius:var(--radius-sm);
  transition:all .2s;
  box-shadow:0 4px 30px rgba(255,20,15,0.35);
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{
  background:#e01200;
  box-shadow:0 4px 50px rgba(255,20,15,0.55);
  transform:translateY(-1px);
}
</style>
</head>
<body>
<div class="wrap">
  <h1>THANK YOU.</h1>
  <p class="sub">Miles and Max will reach out soon.</p>
  <a class="btn" href="https://reconstrength.com/">Explore Recon</a>
</div>
</body>
</html>
